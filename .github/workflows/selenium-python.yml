name: Selenium (Python)

on:
  push:
    paths:
      - "selenium-python/**"
  pull_request:
    paths:
      - "selenium-python/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: selenium-python-pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: selenium-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q --alluredir=allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: selenium-python/allure-results
          allure_report: selenium-python/allure-report
          gh_pages: gh-pages
          allure_history: selenium-python/allure-history
          subfolder: selenium-python

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: selenium-python/allure-history/selenium-python
          destination_dir: selenium-python
