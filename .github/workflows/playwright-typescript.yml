name: Playwright (TypeScript)

on:
  push:
    paths:
      - "playwright-typescript/**"
  pull_request:
    paths:
      - "playwright-typescript/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: playwright-typescript-pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Run tests in Docker
        run: docker compose up --build --abort-on-container-exit --exit-code-from playwright playwright

      - name: Stop Docker services
        if: always()
        run: docker compose down -v

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: artifacts/playwright/allure-results
          allure_report: artifacts/playwright/allure-report
          gh_pages: gh-pages
          allure_history: artifacts/playwright/allure-history
          subfolder: playwright-typescript

      - name: Generate index page
        run: bash .github/scripts/generate-index.sh gh-pages

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/playwright/allure-history/playwright-typescript
          destination_dir: playwright-typescript
