services:
  test-app:
    build:
      context: ./demo-services/test-app
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/app.html"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-api:
    build:
      context: ./demo-services/test-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  playwright:
    build:
      context: .
      dockerfile: playwright-typescript/Dockerfile
    depends_on:
      test-app:
        condition: service_healthy
      test-api:
        condition: service_healthy
    environment:
      BASE_URL: http://test-app/app.html
      API_BASE_URL: http://test-api:8080
    shm_size: 2gb
    volumes:
      - ./artifacts/playwright/test-results:/workspace/playwright-typescript/test-results
      - ./artifacts/playwright/playwright-report:/workspace/playwright-typescript/playwright-report
      - ./artifacts/playwright/allure-results:/workspace/playwright-typescript/allure-results

  selenium-python:
    build:
      context: ./selenium-python
    depends_on:
      test-app:
        condition: service_healthy
    environment:
      BASE_URL: http://test-app/app.html
    shm_size: 2gb
    volumes:
      - ./artifacts/selenium-python/test-results:/app/test-results
      - ./artifacts/selenium-python/allure-results:/app/allure-results

  selenium-java:
    build:
      context: .
      dockerfile: selenium-java/Dockerfile
    depends_on:
      test-app:
        condition: service_healthy
      test-api:
        condition: service_healthy
    environment:
      BASE_URL: http://test-app/app.html
      API_BASE_URL: http://test-api:8080
    shm_size: 2gb
    volumes:
      - ./artifacts/selenium-java/test-results:/workspace/selenium-java/build/test-results
      - ./artifacts/selenium-java/allure-results:/workspace/selenium-java/build/allure-results
      - ./artifacts/selenium-java/allure-report:/workspace/selenium-java/build/reports/allure-report
