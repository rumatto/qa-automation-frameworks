<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Playwright Demo App</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 24px;
      }
      .card {
        max-width: 720px;
        padding: 16px;
        border: 1px solid #ddd;
        border-radius: 10px;
      }
      nav a {
        margin-right: 12px;
      }
      .hidden {
        display: none;
      }
      .error {
        color: #b00020;
      }
      .ok {
        color: #0b6;
      }
      label {
        display: block;
        margin-top: 12px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
      }
      button {
        margin-top: 12px;
        padding: 10px 14px;
      }
      #status {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 data-testid="app-title">Playwright Demo App</h1>

      <section id="login-view">
        <h2>Login</h2>
        <label>
          Username
          <input data-testid="username" autocomplete="off" />
        </label>
        <label>
          Password
          <input data-testid="password" type="password" autocomplete="off" />
        </label>
        <button data-testid="login-btn" type="button">Sign in</button>
        <div id="login-error" class="error hidden" data-testid="login-error">Invalid credentials</div>
      </section>

      <section id="app-view" class="hidden">
        <nav aria-label="Primary">
          <a href="#home" data-testid="nav-home">Home</a>
          <a href="#settings" data-testid="nav-settings">Settings</a>
          <a href="#form" data-testid="nav-form">Form</a>
          <button data-testid="logout-btn" type="button" style="float: right">Logout</button>
        </nav>
        <hr />

        <section id="home" data-testid="view-home">
          <h2>Home</h2>
          <p data-testid="welcome">Welcome, <span data-testid="whoami"></span>.</p>
        </section>

        <section id="settings" data-testid="view-settings" class="hidden">
          <h2>Settings</h2>
          <p data-testid="settings-text">Preferences live here.</p>
        </section>

        <section id="form" data-testid="view-form" class="hidden">
          <h2>Contact</h2>
          <label>
            Email
            <input data-testid="email" placeholder="name@example.com" />
          </label>
          <label>
            Message
            <textarea data-testid="message" rows="3" placeholder="Hello..."></textarea>
          </label>
          <button data-testid="submit-btn" type="button">Submit</button>
          <div id="form-status" data-testid="form-status"></div>
        </section>
      </section>
    </div>

    <script>
      const VALID_USER = 'demo';
      const VALID_PASS = 'secret';

      const loginView = document.querySelector('#login-view');
      const appView = document.querySelector('#app-view');
      const loginError = document.querySelector('#login-error');
      const whoami = document.querySelector('[data-testid="whoami"]');

      function show(viewId) {
        for (const id of ['home', 'settings', 'form']) {
          const el = document.getElementById(id);
          el.classList.toggle('hidden', id !== viewId);
        }
      }

      function setLoggedIn(username) {
        loginView.classList.add('hidden');
        appView.classList.remove('hidden');
        whoami.textContent = username;
        location.hash = '#home';
        show('home');
      }

      function setLoggedOut() {
        appView.classList.add('hidden');
        loginView.classList.remove('hidden');
        loginError.classList.add('hidden');
        document.querySelector('[data-testid="username"]').value = '';
        document.querySelector('[data-testid="password"]').value = '';
      }

      document.querySelector('[data-testid="login-btn"]').addEventListener('click', () => {
        const u = document.querySelector('[data-testid="username"]').value;
        const p = document.querySelector('[data-testid="password"]').value;
        if (u === VALID_USER && p === VALID_PASS) {
          loginError.classList.add('hidden');
          setLoggedIn(u);
          return;
        }
        loginError.classList.remove('hidden');
      });

      document.querySelector('[data-testid="logout-btn"]').addEventListener('click', setLoggedOut);

      document.querySelector('[data-testid="nav-home"]').addEventListener('click', e => {
        e.preventDefault();
        show('home');
      });
      document.querySelector('[data-testid="nav-settings"]').addEventListener('click', e => {
        e.preventDefault();
        show('settings');
      });
      document.querySelector('[data-testid="nav-form"]').addEventListener('click', e => {
        e.preventDefault();
        show('form');
      });

      document.querySelector('[data-testid="submit-btn"]').addEventListener('click', () => {
        const email = document.querySelector('[data-testid="email"]').value.trim();
        const msg = document.querySelector('[data-testid="message"]').value.trim();
        const status = document.querySelector('#form-status');
        if (!email || !email.includes('@') || msg.length < 3) {
          status.textContent = 'Please enter a valid email and message.';
          status.className = 'error';
          return;
        }
        status.textContent = 'Submitted successfully.';
        status.className = 'ok';
      });
    </script>
  </body>
</html>
